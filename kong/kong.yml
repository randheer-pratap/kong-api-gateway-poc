_format_version: "3.0"

services:
  - name: user-service
    url: http://user-service:3001

    routes:
      - name: users-route
        paths:
          - /users
        strip_path: false

  - name: product-service
    url: http://product-service:3002

    routes:
      - name: products-route
        paths:
          - /products
        strip_path: false
